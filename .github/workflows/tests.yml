name: Unit Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore tests/tests/tests.csproj

      - name: Build
        env:
          EmailSettings__Username: ${{ secrets.EMAIL_USERNAME }}
          EmailSettings__Password: ${{ secrets.EMAIL_PASSWORD }}
        run: dotnet build tests/tests/tests.csproj --no-restore

      - name: Run unit tests
        env:
          EmailSettings__Username: ${{ secrets.EMAIL_USERNAME }}
          EmailSettings__Password: ${{ secrets.EMAIL_PASSWORD }}
        run: dotnet test tests/tests/tests.csproj --no-build --verbosity normal
